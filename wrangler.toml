name = "fuel-log"
pages_build_output_dir = "public"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
# Production base URL used to build the Google OAuth redirect URI (no trailing
# slash). Local dev overrides this via .dev.vars. Secrets (Google client id/
# secret) are set with `wrangler pages secret put`, never here.
APP_URL = "https://fuel-log-emg.pages.dev"

[[d1_databases]]
binding = "DB"
database_name = "fuel-log-db"
database_id = "9977ac28-ceef-4da0-8111-38e11e5f4ce1"

[[kv_namespaces]]
binding = "SETTINGS"
id = "b36e07ff5a9445fabcee1eaf851d4e9e"

[[r2_buckets]]
binding = "RECEIPTS"
bucket_name = "fuel-log-receipts"
