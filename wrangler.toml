name = "fuel-log"
pages_build_output_dir = "public"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
# Production base URL used to build the Google OAuth redirect URI (no trailing
# slash). Local dev overrides this via .dev.vars. Secrets (Google client id/
# secret) are set with `wrangler pages secret put`, never here.
APP_URL = "https://fuel-log.pages.dev"

[[d1_databases]]
binding = "DB"
database_name = "fuel-log-db"
database_id = "dc17112f-d5c5-4a95-82d8-8a0fff048d84"

[[kv_namespaces]]
binding = "SETTINGS"
id = "33809ab434194ccb8c3842c0db07056a"

[[r2_buckets]]
binding = "RECEIPTS"
bucket_name = "fuel-log-receipts"
